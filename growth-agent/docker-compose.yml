services:
  growth-agent:
    image: viridis-growth-agent:latest
    restart: unless-stopped
    environment:
      GROWTH_AGENT_ENABLED: ${GROWTH_AGENT_ENABLED:-0}
      GROWTH_AGENT_INTERVAL_SECONDS: ${GROWTH_AGENT_INTERVAL_SECONDS:-86400}
      GROWTH_AGENT_DRY_RUN: ${GROWTH_AGENT_DRY_RUN:-0}
      GROWTH_FLEET_HEALTH_URL: ${GROWTH_FLEET_HEALTH_URL:-https://mcp.viridisconservation.com/healthz}
      GROWTH_OPENAI_ENABLED: ${GROWTH_OPENAI_ENABLED:-0}
      GROWTH_OPENAI_API_KEY: ${GROWTH_OPENAI_API_KEY:-}
      GROWTH_OPENAI_MODEL: ${GROWTH_OPENAI_MODEL:-gpt-5.6-terra}
      GROWTH_OPENAI_MONTHLY_BUDGET_USD: ${GROWTH_OPENAI_MONTHLY_BUDGET_USD:-20.00}
      GROWTH_OPENAI_MAX_CALL_RESERVE_USD: ${GROWTH_OPENAI_MAX_CALL_RESERVE_USD:-0.05}
      GROWTH_OPENAI_MAX_OUTPUT_TOKENS: ${GROWTH_OPENAI_MAX_OUTPUT_TOKENS:-700}
      GROWTH_DISCORD_BOT_TOKEN: ${GROWTH_DISCORD_BOT_TOKEN:-}
      GROWTH_GITHUB_TOKEN: ${GROWTH_GITHUB_TOKEN:-}
      GROWTH_SMITHERY_API_KEY: ${GROWTH_SMITHERY_API_KEY:-}
    volumes:
      - growth_state:/state

volumes:
  growth_state:
