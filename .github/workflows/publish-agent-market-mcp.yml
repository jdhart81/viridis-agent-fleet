name: Publish Agent Market MCP

on:
  push:
    tags:
      - "agent-market-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            -o /tmp/mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  /tmp/mcp-publisher.tar.gz" \
            | sha256sum --check --strict
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher
          chmod +x /tmp/mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: /tmp/mcp-publisher login github-oidc

      - name: Validate manifest
        run: /tmp/mcp-publisher validate mcp-publish-github/agent-market-network-agent/server.json

      - name: Publish manifest
        run: /tmp/mcp-publisher publish mcp-publish-github/agent-market-network-agent/server.json
